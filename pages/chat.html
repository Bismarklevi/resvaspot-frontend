<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resvaspot | Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body data-page="chat">
  <div id="navbar-root"></div>

  <main class="page-shell chat-full-screen">
    <section class="chat-container">
      <div class="chat-layout chat-layout-modern">
        <aside class="chat-sidebar" id="chatSidebar">
          <div class="chat-sidebar-header">
            <h2>Messages</h2>
            <button class="button button-sm button-secondary" type="button">New</button>
          </div>
          <div class="chat-thread-list">
            <article class="chat-thread-card active-thread">
              <div class="chat-thread-avatar">JB</div>
              <div class="chat-thread-copy">
                <div class="chat-thread-topline">
                  <strong>John (Barber)</strong>
                  <span>10:45 AM</span>
                </div>
                <p>Sending the lookbook now...</p>
              </div>
            </article>
            <!-- More threads... -->
          </div>
        </aside>

        <section class="chat-room">
          <div class="chat-room-header">
            <div class="chat-room-identity">
              <button class="back-to-threads" id="backToThreads" type="button" aria-label="Back to conversations">&#8592;</button>
              <div class="chat-room-avatar">JB</div>
              <div>
                <h2>John (Barber)</h2>
                <p>Active now</p>
              </div>
            </div>
          </div>

          <div class="chat-log" id="chatLog">
            <!-- Messages will be rendered here -->
          </div>
          
          <p id="chatTypingIndicator" class="chat-typing-indicator" hidden>Typing...</p>

          <div class="chat-input-wrapper">
            <form class="chat-form" id="chatForm">
              <input type="text" id="chatInput" placeholder="Type your message..." required autocomplete="off">
              <button class="button button-sm" type="submit">Send</button>
            </form>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="../js/auth-core.js"></script>
  <script>window.rvAuth.requireAuth();</script>
  <script src="../js/main.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
